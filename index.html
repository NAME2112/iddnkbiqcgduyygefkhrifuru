<!DOCTYPE html>
<html>
<head>
    <title>Love Message</title>
    <style>
        body{
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            font-family:Arial, sans-serif;
        }

        .love-box{
            text-align:center;
            color:white;
        }

        .heart{
            font-size:100px;
            animation:beat 1s infinite;
        }

        @keyframes beat{
            0%{transform:scale(1);}
            50%{transform:scale(1.2);}
            100%{transform:scale(1);}
        }

        h1{
            font-size:40px;
        }
    </style>
</head>
<body>
    <div class="love-box">
        <div class="heart">❤️</div>
        <h1>I Love You Forever</h1>
        <p> You are the most special person in my life 💕</p>
        <p>@radu_exoistic</p>
    </div>
</body>
</html>
